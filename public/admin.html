<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Admin — VectorMatch AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root{--primary:#6c3fff;--accent:#00d4aa;--ink:#0f0c29;--slate:#64748b;--muted:#94a3b8;--bg:#f4f6fb;--card:#fff;--border:#e2e8f0;--radius:14px}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
    header{background:linear-gradient(135deg,#0f0c29,#302b63);padding:16px 32px;display:flex;align-items:center;justify-content:space-between}
    .logo{display:flex;align-items:center;gap:10px}
    .logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
    .logo-text{font-size:1rem;font-weight:800;color:#fff}.logo-text span{color:var(--accent)}
    .admin-badge{background:rgba(255,255,255,.15);color:#e2e8f0;font-size:.72rem;font-weight:700;padding:4px 12px;border-radius:50px;border:1px solid rgba(255,255,255,.2)}
    .container{max-width:1200px;margin:0 auto;padding:32px 24px}
    /* login */
    #loginSection{display:flex;align-items:center;justify-content:center;min-height:70vh}
    .login-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:40px;width:360px;box-shadow:0 4px 24px rgba(0,0,0,.07)}
    .login-card h2{font-size:1.2rem;font-weight:800;margin-bottom:20px}
    .field{margin-bottom:16px}
    .field label{display:block;font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--slate);margin-bottom:6px}
    .field input{width:100%;padding:11px 14px;border:2px solid var(--border);border-radius:10px;font-size:.92rem;font-family:inherit;background:#fafbfc}
    .field input:focus{outline:none;border-color:var(--primary)}
    .btn{width:100%;background:linear-gradient(135deg,var(--primary),#5128e0);color:#fff;border:none;padding:13px;border-radius:50px;font-size:.95rem;font-weight:700;cursor:pointer;font-family:inherit}
    .err{color:#dc2626;font-size:.83rem;margin-top:10px;display:none}
    /* dashboard */
    #dashboard{display:none}
    .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:28px}
    .stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;box-shadow:0 2px 12px rgba(0,0,0,.05)}
    .stat-num{font-size:2rem;font-weight:900;letter-spacing:-.03em}
    .stat-lbl{font-size:.74rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
    /* tabs */
    .tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--card);border:1px solid var(--border);border-radius:50px;padding:4px;width:fit-content}
    .tab{padding:8px 20px;border-radius:50px;font-size:.85rem;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--slate);font-family:inherit;transition:all .15s}
    .tab.active{background:var(--primary);color:#fff}
    /* table */
    .table-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.05)}
    .search-bar{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;gap:12px;align-items:center}
    .search-bar input{flex:1;padding:9px 14px;border:1px solid var(--border);border-radius:8px;font-size:.88rem;font-family:inherit;background:#fafbfc}
    .search-bar input:focus{outline:none;border-color:var(--primary)}
    .export-btn{padding:8px 18px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:.82rem;font-weight:700;cursor:pointer;font-family:inherit}
    table{width:100%;border-collapse:collapse}
    th{padding:12px 16px;text-align:left;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);border-bottom:1px solid var(--border);background:#fafbfc}
    td{padding:13px 16px;font-size:.87rem;border-bottom:1px solid var(--border);vertical-align:top}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:#fafbfc}
    .badge{display:inline-block;padding:2px 10px;border-radius:50px;font-size:.7rem;font-weight:700}
    .badge-verified{background:#dcfce7;color:#16a34a}
    .badge-pending{background:#fef9c3;color:#a16207}
    .jd-preview{max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--slate);font-size:.82rem}
    .score-chip{display:inline-block;padding:3px 10px;border-radius:50px;font-size:.75rem;font-weight:700}
    .score-high{background:#dcfce7;color:#16a34a}
    .score-mid{background:#fef9c3;color:#a16207}
    .score-low{background:#fee2e2;color:#dc2626}
    .expand-btn{background:none;border:none;color:var(--primary);cursor:pointer;font-size:.8rem;font-weight:600;padding:0;font-family:inherit}
    .detail-row{display:none;background:#f8fafc}
    .detail-content{padding:16px 20px;font-size:.83rem;color:var(--slate);line-height:1.7;white-space:pre-wrap;word-break:break-word;max-height:200px;overflow-y:auto;border-top:1px solid var(--border)}
    .empty{text-align:center;padding:48px;color:var(--muted);font-size:.9rem}
  </style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-icon">🎯</div>
    <div class="logo-text">VectorMatch<span>.AI</span></div>
  </div>
  <div class="admin-badge">Admin Dashboard</div>
</header>

<!-- Login -->
<div id="loginSection">
  <div class="login-card">
    <h2>Admin Login</h2>
    <div class="field"><label>Password</label><input type="password" id="adminPass" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')login()"/></div>
    <button class="btn" onclick="login()">Sign In</button>
    <div class="err" id="loginErr">Incorrect password.</div>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard">
  <div class="container">
    <div class="stats">
      <div class="stat-card"><div class="stat-num" id="stTotal">0</div><div class="stat-lbl">Total Users</div></div>
      <div class="stat-card"><div class="stat-num" id="stVerified">0</div><div class="stat-lbl">Verified</div></div>
      <div class="stat-card"><div class="stat-num" id="stAnalyses">0</div><div class="stat-lbl">Analyses Run</div></div>
      <div class="stat-card"><div class="stat-num" id="stAvgScore">—</div><div class="stat-lbl">Avg Match Score</div></div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="showTab('users')">👥 Users</button>
      <button class="tab" onclick="showTab('analyses')">📊 Analyses</button>
    </div>

    <!-- Users table -->
    <div id="usersTab">
      <div class="table-wrap">
        <div class="search-bar">
          <input type="text" id="userSearch" placeholder="Search by name or email…" oninput="filterUsers()"/>
          <button class="export-btn" onclick="exportCSV('users')">⬇ Export CSV</button>
        </div>
        <table>
          <thead><tr><th>#</th><th>Name</th><th>Email</th><th>Phone</th><th>Status</th><th>Resume</th><th>Registered</th></tr></thead>
          <tbody id="usersBody"></tbody>
        </table>
      </div>
    </div>

    <!-- Analyses table -->
    <div id="analysesTab" style="display:none">
      <div class="table-wrap">
        <div class="search-bar">
          <input type="text" id="analysisSearch" placeholder="Search by name or job description…" oninput="filterAnalyses()"/>
          <button class="export-btn" onclick="exportCSV('analyses')">⬇ Export CSV</button>
        </div>
        <table>
          <thead><tr><th>#</th><th>User</th><th>Job Description</th><th>Score</th><th>Fit Level</th><th>Date</th><th></th></tr></thead>
          <tbody id="analysesBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
  let allUsers = [], allAnalyses = [], adminToken = '';

  function login() {
    const pass = document.getElementById('adminPass').value;
    fetch('/api/admin/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ password: pass })
    }).then(r => r.json()).then(d => {
      if (d.error) { document.getElementById('loginErr').style.display = 'block'; return; }
      adminToken = d.token;
      document.getElementById('loginSection').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      loadData();
    });
  }

  function headers() {
    return { 'Content-Type': 'application/json', 'x-admin-token': adminToken };
  }

  async function loadData() {
    const [ur, ar] = await Promise.all([
      fetch('/api/admin/users', { headers: headers() }).then(r => r.json()),
      fetch('/api/admin/analyses', { headers: headers() }).then(r => r.json()),
    ]);
    allUsers = ur.users || [];
    allAnalyses = ar.analyses || [];
    renderStats();
    renderUsers(allUsers);
    renderAnalyses(allAnalyses);
  }

  function renderStats() {
    document.getElementById('stTotal').textContent = allUsers.length;
    document.getElementById('stVerified').textContent = allUsers.filter(u => u.verified).length;
    document.getElementById('stAnalyses').textContent = allAnalyses.length;
    const scores = allAnalyses.map(a => { try { return JSON.parse(a.result_json).score; } catch(e){ return null; } }).filter(s => s != null);
    document.getElementById('stAvgScore').textContent = scores.length ? Math.round(scores.reduce((a,b)=>a+b,0)/scores.length) + '%' : '—';
  }

  function renderUsers(users) {
    const tbody = document.getElementById('usersBody');
    if (!users.length) { tbody.innerHTML = '<tr><td colspan="7" class="empty">No users yet.</td></tr>'; return; }
    tbody.innerHTML = users.map((u, i) => `
      <tr>
        <td style="color:var(--muted)">${i+1}</td>
        <td><strong>${u.full_name}</strong></td>
        <td>${u.email}</td>
        <td>${u.phone}</td>
        <td><span class="badge ${u.verified ? 'badge-verified' : 'badge-pending'}">${u.verified ? '✅ Verified' : '⏳ Pending'}</span></td>
        <td>${u.resume_filename ? '📄 ' + u.resume_filename : '—'}</td>
        <td style="color:var(--muted);font-size:.8rem">${u.created_at?.split('T')[0] || u.created_at?.split(' ')[0] || '—'}</td>
      </tr>`).join('');
  }

  function renderAnalyses(analyses) {
    const tbody = document.getElementById('analysesBody');
    if (!analyses.length) { tbody.innerHTML = '<tr><td colspan="7" class="empty">No analyses yet.</td></tr>'; return; }
    tbody.innerHTML = analyses.map((a, i) => {
      let score = '—', fitLevel = '—';
      try { const r = JSON.parse(a.result_json); score = r.score; fitLevel = r.fit_level || '—'; } catch(e){}
      const scoreNum = parseInt(score);
      const cls = scoreNum >= 70 ? 'score-high' : scoreNum >= 45 ? 'score-mid' : 'score-low';
      return `
        <tr>
          <td style="color:var(--muted)">${i+1}</td>
          <td><strong>${a.full_name}</strong><br><span style="color:var(--muted);font-size:.78rem">${a.email}</span></td>
          <td><div class="jd-preview">${a.job_description}</div></td>
          <td><span class="score-chip ${cls}">${score}%</span></td>
          <td style="font-size:.82rem">${fitLevel}</td>
          <td style="color:var(--muted);font-size:.8rem">${a.created_at?.split('T')[0] || a.created_at?.split(' ')[0] || '—'}</td>
          <td><button class="expand-btn" onclick="toggleDetail(${i})">View JD</button></td>
        </tr>
        <tr class="detail-row" id="detail-${i}">
          <td colspan="7"><div class="detail-content">${a.job_description}</div></td>
        </tr>`;
    }).join('');
  }

  function toggleDetail(i) {
    const row = document.getElementById('detail-' + i);
    row.style.display = row.style.display === 'table-row' ? 'none' : 'table-row';
  }

  function filterUsers() {
    const q = document.getElementById('userSearch').value.toLowerCase();
    renderUsers(allUsers.filter(u => u.full_name.toLowerCase().includes(q) || u.email.toLowerCase().includes(q)));
  }

  function filterAnalyses() {
    const q = document.getElementById('analysisSearch').value.toLowerCase();
    renderAnalyses(allAnalyses.filter(a => a.full_name?.toLowerCase().includes(q) || a.job_description?.toLowerCase().includes(q)));
  }

  function showTab(tab) {
    document.getElementById('usersTab').style.display = tab === 'users' ? 'block' : 'none';
    document.getElementById('analysesTab').style.display = tab === 'analyses' ? 'block' : 'none';
    document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', (i===0&&tab==='users')||(i===1&&tab==='analyses')));
  }

  function exportCSV(type) {
    const a = document.createElement('a');
    a.href = `/api/admin/export/${type}?token=${adminToken}`;
    a.download = `vectormatch-${type}.csv`;
    a.click();
  }
</script>
</body>
</html>
